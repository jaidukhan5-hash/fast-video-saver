kind = "web"
previewPath = "/"
title = "Fast Video Saver"
version = "1.0.0"
id = "artifacts/fast-video-saver"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21809

[services.development]
run = "pnpm --filter @workspace/fast-video-saver run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/fast-video-saver", "run", "build" ]
publicDir = "artifacts/fast-video-saver/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21809"
BASE_PATH = "/"
