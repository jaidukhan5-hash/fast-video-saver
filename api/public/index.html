<!DOCTYPE html>
<html>
<head>
    <title>Fast Video Saver</title>
    <style>
        body{font-family:Arial;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}
        .box{background:white;border-radius:20px;padding:40px;max-width:500px;width:100%;text-align:center}
        input,button{width:100%;padding:15px;margin:10px 0;border-radius:10px;font-size:16px}
        button{background:linear-gradient(135deg,#667eea,#764ba2);color:white;border:none;cursor:pointer}
        .msg{margin-top:20px;padding:15px;border-radius:10px;display:none}
        .good{background:#d4edda;color:#155724;display:block}
        .bad{background:#f8d7da;color:#721c24;display:block}
        .load{background:#d1ecf1;color:#0c5460;display:block}
    </style>
</head>
<body>
    <div class="box">
        <h1>🚀 Fast Video Saver</h1>
        <p>YouTube | Instagram | Pinterest</p>
        <input type="text" id="url" placeholder="Paste video URL...">
        <button onclick="download()">Download Video</button>
        <div id="msg" class="msg"></div>
    </div>
    <script>
        async function download(){
            const url=document.getElementById('url').value;
            const msg=document.getElementById('msg');
            if(!url){msg.innerHTML='❌ Enter URL';msg.className='msg bad';return;}
            msg.innerHTML='⏳ Processing...';msg.className='msg load';
            try{
                const res=await fetch('/api/download',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({url})});
                const data=await res.json();
                if(data.success){
                    msg.innerHTML=`✅ ${data.platform} ready! Downloading...`;
                    msg.className='msg good';
                    window.open(data.videoUrl,'_blank');
                }else{
                    msg.innerHTML=`❌ ${data.error}`;
                    msg.className='msg bad';
                }
            }catch(e){msg.innerHTML='❌ Error';msg.className='msg bad';}
        }
    </script>
</body>
</html>
