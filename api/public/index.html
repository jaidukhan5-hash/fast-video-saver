<!DOCTYPE html>
<html>

<head>

    <title>Fast Video Saver</title>

    <style>

        body{
            font-family:Arial;
            background:linear-gradient(135deg,#667eea,#764ba2);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px;
        }

        .box{
            background:white;
            border-radius:20px;
            padding:40px;
            max-width:500px;
            width:100%;
            text-align:center;
            box-shadow:0 10px 30px rgba(0,0,0,0.2);
        }

        h1{
            margin-bottom:10px;
        }

        p{
            color:#666;
        }

        input,button{
            width:100%;
            padding:15px;
            margin:10px 0;
            border-radius:10px;
            font-size:16px;
            box-sizing:border-box;
        }

        input{
            border:1px solid #ccc;
        }

        button{
            background:linear-gradient(135deg,#667eea,#764ba2);
            color:white;
            border:none;
            cursor:pointer;
            font-weight:bold;
        }

        button:hover{
            opacity:0.9;
        }

        .msg{
            margin-top:20px;
            padding:15px;
            border-radius:10px;
            display:none;
            word-break:break-word;
        }

        .good{
            background:#d4edda;
            color:#155724;
            display:block;
        }

        .bad{
            background:#f8d7da;
            color:#721c24;
            display:block;
        }

        .load{
            background:#d1ecf1;
            color:#0c5460;
            display:block;
        }

    </style>

</head>

<body>

    <div class="box">

        <h1>🚀 Fast Video Saver</h1>

        <p>YouTube | Instagram | Pinterest</p>

        <input
            type="text"
            id="url"
            placeholder="Paste video URL..."
        >

        <button onclick="downloadVideo()">
            Download Video
        </button>

        <div id="msg" class="msg"></div>

    </div>

    <script>

        async function downloadVideo(){

            const url =
                document.getElementById('url')
                .value
                .trim();

            const msg =
                document.getElementById('msg');

            if(!url){

                msg.innerHTML =
                    '❌ Please enter URL';

                msg.className =
                    'msg bad';

                return;
            }

            msg.innerHTML =
                '⏳ Processing...';

            msg.className =
                'msg load';

            try{

                const response =
                    await fetch('/api/download',{

                        method:'POST',

                        headers:{
                            'Content-Type':'application/json'
                        },

                        body:JSON.stringify({ url })
                    });

                const data =
                    await response.json();

                if(data.success){

                    msg.innerHTML =
                        `✅ ${data.platform} ready!`;

                    msg.className =
                        'msg good';

                    if(data.videoUrl){

                        window.open(
                            data.videoUrl,
                            '_blank'
                        );

                    }else{

                        msg.innerHTML =
                            '❌ No download link found';

                        msg.className =
                            'msg bad';
                    }

                }else{

                    msg.innerHTML =
                        `❌ ${data.error}`;

                    msg.className =
                        'msg bad';
                }

            }catch(error){

                msg.innerHTML =
                    '❌ Server Error';

                msg.className =
                    'msg bad';
            }
        }

    </script>

</body>
</html>
